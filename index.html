<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Me Up: Handsign Translator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Erica+One&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Righteous&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>

    <main class="app-wrapper">
        
        <header class="app-header">
            <div class="brand">
                <h1>Sign Me Up</h1>
            </div>
            <div class="tagline">
                ASASIPintar 2025/2026<br>
                Universiti Kebangsaan Malaysia
            </div>
        </header>

        <div class="dashboard-layout">
            
            <section class="card vision-card">
                <div class="card-header">
                    <h2>Optical Input</h2>
                    <span class="status-pill">Ready</span>
                </div>
                
                <div class="video-container">
                    <video id="input_video" autoplay playsinline></video>
                    <canvas id="output_canvas" width="640" height="480"></canvas>
                    
                    <div id="loading-spinner" class="spinner hidden"></div>

                    <div id="camera-placeholder" class="overlay-state">
                        <div class="overlay-text">
                            <h3>Camera Paused</h3>
                            <p>Start the camera to begin translating.</p>
                        </div>
                    </div>
                </div>

                <div class="controls-container">
                    <select id="device-select" class="elegant-select" aria-label="Select Camera Device">
                        <option value="" disabled selected>Select Camera Device</option>
                    </select>
                    <button id="start-btn" class="btn-primary" onclick="toggleCamera()">
                        Start Camera
                    </button>
                </div>
            </section>

            <section class="card output-card">
                
                <div class="detection-wrapper">
                    <h2 class="section-title">Current Gesture</h2>
                    <div class="gesture-display-box">
                        <div id="prediction-display">
                            <span class="placeholder-text">Waiting...</span>
                        </div>
                    </div>
                    
                    <div id="confidence-bar-container" class="confidence-tracker">
                        <div class="confidence-header">
                            <span>Certainty</span>
                            <span id="conf-value" class="conf-percentage">0%</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="conf-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="translation-wrapper">
                    <div class="translation-header">
                        <h2 class="section-title">Translation</h2>
                        <div class="action-buttons">
                            <button id="backspace-btn" class="btn-icon" onclick="handleBackspace()" aria-label="Backspace" title="Backspace">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
                            </button>
                            <button id="clear-btn" class="btn-icon danger" onclick="clearSentence()" aria-label="Clear Translation" title="Clear">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="output-grid">
                        
                        <div class="lang-box">
                            <div class="lang-header">
                                <label>English</label>
                                <button id="speak-en-btn" class="btn-icon speak-btn" onclick="speakText('en')" aria-label="Speak English" title="Speak English">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                </button>
                            </div>
                            <div id="output-en" class="text-window">
                                <span class="placeholder-text">Translation will appear here...</span>
                            </div>
                        </div>

                        <div class="lang-box">
                            <div class="lang-header">
                                <label>Bahasa Melayu</label>
                                <button id="speak-ms-btn" class="btn-icon speak-btn" onclick="speakText('ms')" aria-label="Speak Bahasa Melayu" title="Speak Bahasa Melayu">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                                </button>
                            </div>
                            <div id="output-ms" class="text-window">
                                <span class="placeholder-text">Terjemahan akan dipaparkan...</span>
                            </div>
                        </div>

                    </div>
                </div>

            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
