<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | AI Vision Core</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>

    <div class="cyber-grid"></div>

    <main class="dashboard-container">
        
        <header class="sys-header">
            <div class="brand">
                <div class="logo-mark">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <div>
                    <h1>NEXUS <span class="fw-light">VISION CORE</span></h1>
                    <p class="sys-status">ENTERPRISE KINETIC TRANSLATION PROTOCOL</p>
                </div>
            </div>
            <div class="status-indicator">
                <div class="pulse-dot online"></div>
                <span>SYSTEM ONLINE</span>
            </div>
        </header>

        <div class="grid-layout">
            
            <section class="panel camera-panel">
                <div class="panel-header">
                    <h2>OPTICAL SENSOR FEED</h2>
                    <span class="badge">SECURE</span>
                </div>
                
                <div class="video-wrapper">
                    <video id="input_video" autoplay playsinline></video>
                    <canvas id="output_canvas" width="640" height="480"></canvas>
                    
                    <div id="loading-spinner" class="spinner hidden"></div>

                    <div id="camera-placeholder" class="feed-overlay">
                        <div class="overlay-content">
                            <h3>SENSOR OFFLINE</h3>
                            <p>Awaiting initialization command...</p>
                        </div>
                    </div>
                    
                    <div class="corner t-l"></div><div class="corner t-r"></div>
                    <div class="corner b-l"></div><div class="corner b-r"></div>
                </div>

                <div class="control-deck">
                    <button id="start-btn" class="cyber-btn btn-primary" onclick="toggleCamera()">
                        INITIALIZE SENSOR
                    </button>
                    <select id="device-select" class="cyber-select">
                        <option value="" disabled selected>SELECT INPUT DEVICE</option>
                    </select>
                </div>
            </section>

            <section class="data-section">
                
                <div class="panel analytics-panel">
                    <div class="panel-header">
                        <h2>REAL-TIME CLASSIFICATION</h2>
                    </div>
                    
                    <div class="target-box">
                        <div id="prediction-display">
                            <span class="placeholder-text">AWAITING GESTURE...</span>
                        </div>
                    </div>
                    
                    <div id="confidence-bar-container" class="telemetry">
                        <div class="telemetry-labels">
                            <span>CONFIDENCE METRIC</span>
                            <span id="conf-value" class="highlight">0%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="conf-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="panel translation-panel">
                    <div class="panel-header">
                        <h2>TRANSLATION LOG</h2>
                        <div class="action-icons">
                            <button id="backspace-btn" class="icon-btn" onclick="handleBackspace()" title="Backspace">⌫</button>
                            <button id="clear-btn" class="icon-btn danger" onclick="clearSentence()" title="Clear Memory">✕</button>
                        </div>
                    </div>
                    
                    <div class="log-container">
                        <div class="log-entry">
                            <label>EN_OUTPUT</label>
                            <div id="output-en" class="output-text">
                                <span class="placeholder-text">System standby...</span>
                            </div>
                        </div>
                        <div class="log-entry">
                            <label>MS_OUTPUT</label>
                            <div id="output-ms" class="output-text">
                                <span class="placeholder-text">Sistem bersedia...</span>
                            </div>
                        </div>
                    </div>
                </div>

            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
