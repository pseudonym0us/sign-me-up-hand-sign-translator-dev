<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Me Up | AI Translator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>
        /* === BASE & RESET === */
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(30, 41, 59, 0.5);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --panel-bg: rgba(15, 23, 42, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* === BACKGROUND EFFECTS === */
        .app-shell { position: relative; width: 100%; max-width: 1200px; display: flex; justify-content: center; }
        
        .blob {
            position: absolute;
            width: 60vw;
            height: 60vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.25) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: blur(60px);
            animation: pulse-blob 8s infinite alternate ease-in-out;
        }

        @keyframes pulse-blob {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* === GLASS CONTAINER === */
        .glass-container {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* === HEADER === */
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .logo-area { display: flex; align-items: center; gap: 16px; }
        .icon-circle { font-size: 2rem; background: rgba(255,255,255,0.1); width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; border-radius: 16px; border: 1px solid var(--glass-border); }
        .title-text h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .subtitle { font-size: 0.875rem; color: var(--text-muted); }
        
        .status-badge { display: flex; align-items: center; gap: 8px; background: rgba(16, 185, 129, 0.1); color: var(--success); padding: 8px 16px; border-radius: 99px; font-size: 0.875rem; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-dot { width: 8px; height: 8px; background-color: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* === LAYOUT GRID === */
        .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

        /* === CAMERA SECTION === */
        .camera-card { display: flex; flex-direction: column; gap: 16px; }
        .card-label, .section-title { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        #input_video, #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #output_canvas { z-index: 5; }
        
        .overlay-ui { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); z-index: 10; color: var(--text-muted); gap: 12px; transition: opacity 0.3s; }
        .pulse-icon svg { color: var(--text-muted); }
        
        .camera-controls { display: flex; gap: 12px; }
        .camera-controls select { flex: 1; background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; outline: none; cursor: pointer; font-size: 0.875rem; }

        /* === BUTTONS === */
        button { border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.875rem; }
        .btn-primary { background: var(--primary); color: white; flex: 1; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 10px 20px -10px var(--primary); }
        .btn-secondary { background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--glass-border); flex: 1; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); flex: 1; }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* === DATA & TRANSLATION SECTION === */
        .data-card { display: flex; flex-direction: column; gap: 24px; }
        .detection-box, .translation-box { background: var(--panel-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px; }
        
        /* Prediction Area */
        .prediction-display-area { min-height: 80px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 16px; border: 1px dashed var(--glass-border); }
        #prediction-display { font-size: 2.5rem; font-weight: 800; text-align: center; background: -webkit-linear-gradient(45deg, #fff, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .placeholder-text { font-size: 1rem; color: var(--text-muted); font-weight: 400; -webkit-text-fill-color: var(--text-muted); }

        /* Confidence Bar */
        .confidence-info { display: flex; justify-content: space-between; font-size: 0.875rem; margin-bottom: 8px; color: var(--text-muted); }
        #conf-value { font-weight: 700; color: var(--text-main); }
        .progress-track { width: 100%; height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #a855f7); width: 0%; transition: width 0.3s ease; }

        /* History Grid */
        .history-grid { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        .lang-unit { display: flex; flex-direction: column; gap: 8px; }
        .unit-header { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); }
        .flag-icon { border-radius: 2px; width: 20px; }
        .text-output-window { background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; min-height: 60px; font-size: 1rem; line-height: 1.5; word-wrap: break-word; }

        .action-toolbar { display: flex; gap: 12px; }
        
        /* Utility */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="blob"></div>
        
        <main class="glass-container">
            <header class="app-header">
                <div class="logo-area">
                    <div class="icon-circle">🤟</div>
                    <div class="title-text">
                        <h1>Sign Me Up</h1>
                        <p class="subtitle">AI-Powered Hand Sign Translation</p>
                    </div>
                </div>
                <div class="status-badge" id="system-status">
                    <span class="status-dot"></span> System Ready
                </div>
            </header>

            <div class="main-layout">
                
                <section class="camera-card">
                    <div class="card-label">Visual Input</div>
                    <div class="video-wrapper">
                        <video id="input_video" autoplay playsinline></video>
                        <canvas id="output_canvas" width="640" height="480"></canvas>
                        
                        <div id="camera-placeholder" class="overlay-ui">
                            <div class="pulse-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                                    <circle cx="12" cy="13" r="4"></circle>
                                </svg>
                            </div>
                            <p>Camera is currently offline</p>
                        </div>
                    </div>

                    <div class="camera-controls">
                        <button id="start-btn" class="btn-primary" onclick="toggleCamera()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                            <span class="btn-label">Start Camera</span>
                        </button>
                        <select id="device-select">
                            <option value="" disabled selected>Select Input Device</option>
                        </select>
                    </div>
                </section>

                <section class="data-card">
                    
                    <div class="detection-box">
                        <h3 class="section-title">Live Detection</h3>
                        <div class="prediction-display-area">
                            <div id="prediction-display">
                                <span class="placeholder-text">Waiting for input...</span>
                            </div>
                        </div>
                        
                        <div class="confidence-wrapper">
                            <div class="confidence-info">
                                <span>Confidence Score</span>
                                <span id="conf-value">0%</span>
                            </div>
                            <div class="progress-track">
                                <div class="progress-fill" id="conf-fill"></div>
                            </div>
                        </div>
                    </div>

                    <div class="translation-box">
                        <h3 class="section-title">Live Translation</h3>
                        
                        <div class="history-grid">
                            <div class="lang-unit">
                                <div class="unit-header">
                                    <img src="https://flagcdn.com/w20/gb.png" alt="English Flag" class="flag-icon">
                                    <span>English</span>
                                </div>
                                <div id="output-en" class="text-output-window">
                                    <span class="placeholder-text">Translation will appear here...</span>
                                </div>
                            </div>

                            <div class="lang-unit">
                                <div class="unit-header">
                                    <img src="https://flagcdn.com/w20/my.png" alt="Malaysia Flag" class="flag-icon">
                                    <span>Bahasa Melayu</span>
                                </div>
                                <div id="output-ms" class="text-output-window">
                                    <span class="placeholder-text">Terjemahan akan dipaparkan di sini...</span>
                                </div>
                            </div>
                        </div>

                        <div class="action-toolbar">
                            <button id="backspace-btn" class="btn-secondary" onclick="handleBackspace()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
                                Backspace
                            </button>
                            <button id="clear-btn" class="btn-danger" onclick="clearSentence()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                Clear All
                            </button>
                        </div>
                    </div>

                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
